<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Submit Tracker | Enterprise Dashboard</title>
  
  <!-- Preconnect for Performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Loading Overlay -->
  <div id="appLoader" class="app-loader">
    <div class="loader-content">
      <div class="loader-spinner"></div>
      <p class="loader-text">Initializing Dashboard...</p>
    </div>
  </div>

  <!-- Login Screen -->
  <div id="loginScreen" class="login-screen">
    <div class="login-container">
      <div class="login-brand">
        <div class="brand-logo">
          <i class="fas fa-chart-line"></i>
        </div>
        <h1>Submit Tracker</h1>
        <p>Enterprise Operations Dashboard</p>
      </div>
      
      <form id="loginForm" class="login-form" onsubmit="App.handleLogin(event)">
        <div class="md3-input-group">
          <label for="username">
            <i class="fas fa-user"></i>
            <span>Username</span>
          </label>
          <input 
            type="text" 
            id="username" 
            name="username" 
            required 
            autocomplete="username"
            placeholder="Enter your username"
            class="md3-input"
          >
        </div>
        
        <div class="md3-input-group">
          <label for="password">
            <i class="fas fa-lock"></i>
            <span>Password</span>
          </label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            required 
            autocomplete="current-password"
            placeholder="Enter your password"
            class="md3-input"
          >
        </div>
        
        <div id="loginError" class="error-message" style="display: none;">
          <i class="fas fa-exclamation-circle"></i>
          <span id="loginErrorText">Invalid credentials</span>
        </div>
        
        <button type="submit" class="md3-button md3-button-primary" id="loginBtn">
          <span>Sign In</span>
          <i class="fas fa-arrow-right"></i>
        </button>
      </form>
      
      <div class="login-loading" id="loginLoading" style="display: none;">
        <div class="spinner-ring"></div>
        <p>Authenticating...</p>
      </div>
    </div>
  </div>

  <!-- Main Application -->
  <div id="appContainer" class="app-container" style="display: none;">
    <!-- Header -->
    <header class="md3-header">
      <div class="header-left">
        <button class="icon-button menu-toggle" onclick="App.toggleSidebar()" aria-label="Toggle menu">
          <i class="fas fa-bars"></i>
        </button>
        
        <div class="brand">
          <div class="brand-icon">
            <i class="fas fa-chart-line"></i>
          </div>
          <div class="brand-info">
            <h1>Submit Tracker</h1>
            <span class="subtitle" id="userRoleDisplay">Loading...</span>
          </div>
        </div>
      </div>
      
      <div class="header-center">
        <div class="status-chip" id="connectionStatus">
          <span class="status-dot live"></span>
          <span class="status-text">Live</span>
        </div>
      </div>
      
      <div class="header-right">
        <div class="user-menu">
          <div class="user-avatar" onclick="App.toggleUserMenu()">
            <i class="fas fa-user-circle"></i>
            <span id="userNameDisplay">User</span>
          </div>
          <div class="user-dropdown" id="userDropdown">
            <button class="dropdown-item" onclick="App.showProfile()">
              <i class="fas fa-user"></i> Profile
            </button>
            <button class="dropdown-item" onclick="App.showSettings()">
              <i class="fas fa-cog"></i> Settings
            </button>
            <hr class="dropdown-divider">
            <button class="dropdown-item danger" onclick="App.handleLogout()">
              <i class="fas fa-sign-out-alt"></i> Logout
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Sidebar (Admin Panel) -->
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-title">Main Menu</div>
          <button class="nav-item active" onclick="App.showDashboard()">
            <i class="fas fa-home"></i>
            <span>Dashboard</span>
          </button>
          
          <button class="nav-item" onclick="App.showUserManagement()" id="adminNav" style="display: none;">
            <i class="fas fa-users-cog"></i>
            <span>User Management</span>
          </button>
        </div>
        
        <div class="nav-section">
          <div class="nav-title">Quick Filters</div>
          <select id="shiftFilter" class="md3-select" onchange="App.filterData()">
            <option value="all">All Shifts</option>
          </select>
          
          <select id="locationFilter" class="md3-select" onchange="App.filterData()">
            <option value="all">All Locations</option>
          </select>
          
          <input 
            type="date" 
            id="datePicker" 
            class="md3-input" 
            onchange="App.manualRefresh()"
          >
        </div>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
      <!-- Dashboard View -->
      <div id="dashboardView" class="view active">
        <!-- Metrics Cards -->
        <div class="metrics-grid" id="metricsGrid">
          <!-- Dynamically populated -->
        </div>
        
        <!-- Search Bar -->
        <div class="search-bar">
          <div class="search-input-wrapper">
            <i class="fas fa-search"></i>
            <input 
              type="text" 
              id="searchInput" 
              class="md3-input search-input"
              placeholder="Search by email or PC..."
              oninput="App.debounceSearch()"
            >
            <kbd class="search-shortcut">Ctrl+K</kbd>
          </div>
        </div>
        
        <!-- Content Area -->
        <div class="content-area" id="contentArea">
          <!-- Dynamically populated -->
        </div>
      </div>
      
      <!-- User Management View -->
      <div id="userManagementView" class="view">
        <div class="view-header">
          <h2>User Management</h2>
          <button class="md3-button md3-button-primary" onclick="UserManagement.showCreateModal()">
            <i class="fas fa-plus"></i>
            <span>Create User</span>
          </button>
        </div>
        
        <div class="users-table-container">
          <table class="md3-table" id="usersTable">
            <thead>
              <tr>
                <th>Username</th>
                <th>Role</th>
                <th>Permission</th>
                <th>Assigned Shift</th>
                <th>Created</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="usersTableBody">
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast Notifications -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Modals -->
  <div id="modalOverlay" class="modal-overlay" style="display: none;">
    <!-- Dynamic modal content -->
  </div>

  <!-- Scripts -->
  <script src="config.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
