<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Submit Tracker | Operations Dashboard</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Application Stylesheet -->
    <link rel="stylesheet" href="style.css">
<base target="_blank">
</head>
<body>

    <!-- ── Login Overlay ────────────────────────────────── -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-container">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-chart-line"></i>
                </div>
                <h1>Submit Tracker</h1>
                <p>Operations Dashboard</p>
            </div>

            <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                <div class="login-input-group">
                    <label for="username"><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username" placeholder="Enter your username">
                </div>

                <div class="login-input-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
                </div>

                <div id="loginError" class="login-error" style="display: none;">
                    <i class="fas fa-exclamation-circle"></i>
                    <span>Invalid username or password</span>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Login to Dashboard</span>
                </button>
            </form>

            <div class="login-loading" id="loginLoading" style="display: none;">
                <div class="spinner-ring"></div>
                <p>Authenticating...</p>
            </div>
        </div>
    </div>

    <!-- ── Ambient Background (Desktop Only) ───────────── -->
    <div class="ambient-orb orb-1" id="orb1"></div>
    <div class="ambient-orb orb-2" id="orb2"></div>
    <div class="ambient-orb orb-3" id="orb3"></div>

    <!-- ── SVG Gradient Definition ─ -->
    <svg style="position: absolute; width: 0; height: 0;" aria-hidden="true">
        <defs>
            <linearGradient id="gradient-progress" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%"   stop-color="#a5b4fc"/>
                <stop offset="50%"  stop-color="#6ee7b7"/>
                <stop offset="100%" stop-color="#6ee7b7"/>
            </linearGradient>
        </defs>
    </svg>

    <!-- ── Silent Update Toast ─────────────────────────── -->
    <div class="silent-update" id="silentUpdate" aria-live="polite">
        <i class="fas fa-sync-alt"></i>
        <span>Data updated</span>
    </div>

    <!-- ── Main Application Wrapper ────────────────────── -->
    <div class="app-container">

        <!-- Sticky Header -->
        <header id="mainHeader">
            <div class="header-left">
                <div class="logo-section">
                    <div class="logo-icon" aria-hidden="true">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <div class="brand-text">
                        <h1>Submit Tracker</h1>
                        <p id="roleDisplay">Operations Dashboard</p>
                    </div>
                </div>

                <div class="status-indicator" id="statusIndicator" role="status" aria-live="polite">
                    <div class="status-dot live-dot" id="statusDot"></div>
                    <span id="statusText">INITIALIZING...</span>
                </div>
            </div>

            <!-- Filter Controls -->
            <div class="controls" id="controlsArea">
                <div class="search-wrapper">
                    <input type="text" class="search-input" id="searchInput" placeholder="Search... (Ctrl+K)" aria-label="Search" oninput="handleSearch()">
                    <i class="fas fa-search search-icon" aria-hidden="true"></i>
                </div>

                <select id="shiftFilter" aria-label="Filter by shift" onchange="handleShiftChange()">
                    <option value="all">All Shifts</option>
                </select>

                <select id="locFilter" aria-label="Filter by location" onchange="handleLocationChange()">
                    <option value="all">All Locations</option>
                </select>

                <input type="date" id="datePicker" aria-label="Select date" onchange="manualRefresh()">

                <!-- User Info & Logout -->
                <div class="user-info" id="userInfo" style="display: none;">
                    <div class="user-badge">
                        <i class="fas fa-user-circle"></i>
                        <span id="userNameDisplay"></span>
                        <span class="user-role" id="userRoleDisplay"></span>
                    </div>
                    <button class="logout-btn" onclick="handleLogout()" title="Logout">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- ── Shift Supervisor View ─────────────────────── -->
        <div id="shiftSupervisorView" class="role-view" style="display: none;">
            <div class="ss-header">
                <div class="ss-shift-badge" id="ssShiftBadge">
                    <i class="fas fa-sun"></i>
                    <span>Morning Shift</span>
                </div>
                <div class="ss-date" id="ssDate"></div>
            </div>

            <!-- Summary Cards -->
            <div class="ss-summary-grid" id="ssSummaryGrid">
                <!-- Injected by JS -->
            </div>

            <!-- Breakdown Sections -->
            <div class="ss-breakdown-container" id="ssBreakdownContainer">
                <!-- Injected by JS -->
            </div>
        </div>

        <!-- ── Supervisor Room Breakdown View ────────────── -->
        <div id="supervisorView" class="role-view" style="display: none;">
            <div class="sv-header">
                <h2 id="svLocationTitle">Room Breakdown</h2>
                <div class="sv-totals" id="svTotals"></div>
            </div>
            <div class="sv-teams-container" id="svTeamsContainer">
                <!-- Injected by JS -->
            </div>
        </div>

        <!-- ── QC Team Breakdown View ────────────────────── -->
        <div id="qcView" class="role-view" style="display: none;">
            <div class="qc-header">
                <h2 id="qcTeamTitle">Team Breakdown</h2>
                <div class="qc-totals" id="qcTotals"></div>
            </div>
            <div class="qc-task-breakdown" id="qcTaskBreakdown">
                <!-- Injected by JS -->
            </div>
            <div class="qc-users-container" id="qcUsersContainer">
                <!-- Injected by JS -->
            </div>
        </div>

        <!-- ── Default Dashboard View ────────────────────── -->
        <main id="contentArea" aria-live="polite"></main>

    </div><!-- /.app-container -->

    <!-- ── Scripts ─────── -->
    <script src="config.js" defer></script>
    <script src="script.js" defer></script>

</body>
</html>
