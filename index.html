<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Submit Tracker | Live Dashboard</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══ LOGIN OVERLAY ════════════════════════════════════════ -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo"><i class="fas fa-chart-line"></i></div>
      <h1>Submit Tracker</h1>
      <p>Live Operations Dashboard</p>
    </div>

    <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
      <div class="login-input-group">
        <label for="username"><i class="fas fa-user"></i> Username</label>
        <input type="text" id="username" required autocomplete="username" placeholder="Enter your username">
      </div>
      <div class="login-input-group">
        <label for="password"><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="password" required autocomplete="current-password" placeholder="Enter your password">
      </div>

      <div id="loginError" class="login-error" style="display:none;">
        <i class="fas fa-exclamation-circle"></i>
        <span>Invalid username or password</span>
      </div>

      <button type="submit" class="login-btn" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i>
        <span>Login to Dashboard</span>
      </button>
    </form>

    <div class="login-loading" id="loginLoading" style="display:none;">
      <div class="spinner-ring"></div>
      <p>Authenticating…</p>
    </div>
  </div>
</div>

<!-- ══ AMBIENT ORBS ══════════════════════════════════════════ -->
<div class="ambient-orb orb-1"></div>
<div class="ambient-orb orb-2"></div>
<div class="ambient-orb orb-3"></div>

<!-- SVG gradient for progress rings -->
<svg style="position:absolute;width:0;height:0;" aria-hidden="true">
  <defs>
    <linearGradient id="gradient-progress" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
  </defs>
</svg>

<!-- ══ SILENT UPDATE TOAST ═══════════════════════════════════ -->
<div class="silent-update" id="silentUpdate" aria-live="polite">
  <i class="fas fa-sync-alt"></i><span>Data updated</span>
</div>

<!-- ══ BREAKDOWN SLIDE PANEL ════════════════════════════════ -->
<div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>
<div class="breakdown-panel" id="breakdownPanel">
  <div class="panel-header">
    <h2 class="panel-title" id="panelTitle">Breakdown</h2>
    <button class="panel-close" onclick="closePanel()"><i class="fas fa-times"></i></button>
  </div>
  <div class="panel-body" id="panelBody">
    <div class="panel-loader"><div class="spinner-ring"></div></div>
  </div>
</div>

<!-- ══ MAIN APP ══════════════════════════════════════════════ -->
<div class="app-container">

  <!-- Sticky Header -->
  <header id="mainHeader">
    <div class="header-left">
      <div class="logo-section">
        <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
        <div class="brand-text">
          <h1>Submit Tracker</h1>
          <p>Live Operations Dashboard</p>
        </div>
      </div>
      <div class="status-indicator" id="statusIndicator" role="status" aria-live="polite">
        <div class="status-dot live-dot" id="statusDot"></div>
        <span id="statusText">INITIALIZING…</span>
      </div>
    </div>

    <div class="controls">
      <div class="search-wrapper">
        <input type="text" class="search-input" id="searchInput"
               placeholder="Search email or PC… (Ctrl+K)"
               oninput="handleSearch()">
        <i class="fas fa-search search-icon"></i>
      </div>

      <select id="shiftFilter" onchange="renderData()">
        <option value="all">All Shifts</option>
      </select>

      <select id="locFilter" onchange="renderData()">
        <option value="all">All Locations</option>
      </select>

      <input type="date" id="datePicker" onchange="manualRefresh()">

      <div class="user-info" id="userInfo" style="display:none;">
        <div class="user-badge">
          <i class="fas fa-user-circle"></i>
          <span id="userNameDisplay"></span>
          <span class="user-role" id="userRoleDisplay"></span>
        </div>
        <button class="logout-btn" onclick="handleLogout()" title="Logout">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- Shift Supervisor Hero (hidden by default) -->
  <div id="shiftSupervisorView" style="display:none;"></div>

  <!-- Main content -->
  <main id="contentArea" aria-live="polite"></main>

</div><!-- /.app-container -->

<script src="config.js"  defer></script>
<script src="script.js"  defer></script>
</body>
</html>
